name: Maestro Android Smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "app/**"
      - "src/**"
      - "e2e/**"
      - "package.json"
      - "package-lock.json"
      - "app.json"

jobs:
  maestro-android:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build Android preview
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build --profile preview --platform android --non-interactive --wait --json > eas-build.json
          node -e "const fs=require('fs'); const raw=fs.readFileSync('eas-build.json','utf8'); const json=JSON.parse(raw); const build=Array.isArray(json)?json[0]:json; const url=build.artifacts?.buildUrl || build.artifactUrl || build.buildUrl; if(!url){ console.error(raw); process.exit(1); } fs.writeFileSync('apk-url.txt', url);"

      - name: Download APK
        run: curl -L "$(cat apk-url.txt)" -o app-preview.apk

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Run Maestro on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: |
            adb install -r app-preview.apk
            maestro test e2e/maestro --format junit --output maestro-report.xml

      - name: Upload Maestro artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-android-artifacts
          path: |
            maestro-report.xml
            app-preview.apk
            eas-build.json
            ~/.maestro/tests
