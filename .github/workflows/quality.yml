name: Quality

on:
  pull_request:
  push:
    branches:
      - main
      - upgrade/sdk-56-x10

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Seed data lint
        run: npm run seed:lint

      - name: Supabase type freshness
        run: npm run types:supabase:check

      - name: Expo Doctor
        run: npx expo-doctor

      - name: Expo dependency check
        run: npx expo install --check

      - name: Web export smoke
        run: npm run smoke:web

      - name: High severity audit
        run: npm run audit:high

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
